<!DOCTYPE html>
<html lang="en">

<head>
    <title>Multisearch</title>
    <meta charset="utf-8">
</head>

<body>
    <form>
        <input type="search" placeholder="Search for any media" id="mediaSearch" aria-label="Search for any media"
            autofocus />
        <button type="submit" id="mediaButton">Search</button>
    </form>
    <br>
    <form>
        <input type="search" placeholder="Search for a song" id="songSearch" aria-label="Search for a song" />
        <button type="submit" id="songButton">Search</button>
    </form>
    <br>
    <form>
        <input type="search" placeholder="Search for a game" id="gameSearch" aria-label="Search for a game" />
        <button type="submit" id="gameButton">Search</button>
    </form>
</body>
<script src="script.js"></script>

</html>
